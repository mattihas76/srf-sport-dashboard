<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevent caching so Wix iframe always loads the latest version -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SRF Sport Dashboard</title>
    <meta name="description" content="Live Sport Ticker mit den neuesten Headlines von SRF Sport.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #d4edda;
            --bg-card: rgba(255,255,255,0.3);
            --bg-card-hover: rgba(255,255,255,0.12);
            --glass-border: rgba(0,0,0,0.08);
            --accent-fussball: #22c55e;
            --accent-eishockey: #3b82f6;
            --accent-tennis: #f59e0b;
            --accent-mehr: #a855f7;
            --text-main: #1e293b;
            --text-muted: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
        }

        /* Main banner container - fills entire viewport */
        .banner-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Top bar with logo and update info */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.5rem;
            background: rgba(0,0,0,0.05);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            min-height: 40px;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #22c55e, #3b82f6, #f59e0b, #a855f7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        .update-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Progress bar showing current position */
        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(0,0,0,0.08);
            z-index: 10;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #3b82f6, #f59e0b, #a855f7);
            background-size: 300% 100%;
            animation: gradientShift 6s ease infinite;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Ticker area */
        .ticker-viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .ticker-track {
            display: flex;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        /* Individual article slide */
        .slide {
            flex-shrink: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem 3rem;
            position: relative;
        }

        .slide-image-wrapper {
            flex-shrink: 0;
            width: 45%;
            max-width: 500px;
            height: 80%;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 8s ease;
        }

        .slide.active .slide-image {
            transform: scale(1.05);
        }

        /* Category accent bar on top of image */
        .slide-image-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 2;
        }

        .slide.cat-fussball .slide-image-wrapper::before { background: var(--accent-fussball); }
        .slide.cat-eishockey .slide-image-wrapper::before { background: var(--accent-eishockey); }
        .slide.cat-tennis .slide-image-wrapper::before { background: var(--accent-tennis); }
        .slide.cat-mehr-sport .slide-image-wrapper::before { background: var(--accent-mehr); }

        .slide-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.75rem;
            max-width: 500px;
        }

        .slide-category {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.2s;
        }

        .slide.active .slide-category {
            opacity: 1;
            transform: translateY(0);
        }

        .slide.cat-fussball .slide-category { color: var(--accent-fussball); }
        .slide.cat-eishockey .slide-category { color: var(--accent-eishockey); }
        .slide.cat-tennis .slide-category { color: var(--accent-tennis); }
        .slide.cat-mehr-sport .slide-category { color: var(--accent-mehr); }

        .slide-title {
            font-size: clamp(1.1rem, 2.5vw, 1.8rem);
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-main);
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s ease 0.35s;
        }

        .slide.active .slide-title {
            opacity: 1;
            transform: translateY(0);
        }



        /* Slide counter dots */
        .slide-dots {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .dot.active {
            width: 20px;
            border-radius: 3px;
            background: rgba(0,0,0,0.4);
        }

        /* Countdown timer ring */
        .countdown-ring {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            width: 36px;
            height: 36px;
            z-index: 10;
        }

        .countdown-ring svg {
            transform: rotate(-90deg);
        }

        .countdown-ring circle {
            fill: none;
            stroke-width: 2.5;
        }

        .countdown-ring .ring-bg {
            stroke: rgba(0,0,0,0.1);
        }

        .countdown-ring .ring-progress {
            stroke: rgba(0,0,0,0.3);
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* Loading / Update overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(212, 237, 218, 0.95);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .overlay-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
        }

        /* Edge fade gradients */
        .ticker-viewport::before,
        .ticker-viewport::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 60px;
            z-index: 5;
            pointer-events: none;
        }

        .ticker-viewport::before {
            left: 0;
            background: linear-gradient(to right, var(--bg-dark), transparent);
        }

        .ticker-viewport::after {
            right: 0;
            background: linear-gradient(to left, var(--bg-dark), transparent);
        }

        /* Error state */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #f87171;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>
    <div class="banner-wrapper">
        <!-- Top bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="live-dot"></div>
                <div class="logo">SRF SPORT</div>
            </div>
            <div class="update-badge" id="update-badge">Wird geladen...</div>
        </div>

        <!-- Ticker viewport -->
        <div class="ticker-viewport" id="ticker-viewport">
            <div class="ticker-track" id="ticker-track"></div>

            <!-- Countdown ring -->
            <div class="countdown-ring" id="countdown-ring">
                <svg viewBox="0 0 36 36">
                    <circle class="ring-bg" cx="18" cy="18" r="15.5"></circle>
                    <circle class="ring-progress" id="ring-progress" cx="18" cy="18" r="15.5"></circle>
                </svg>
            </div>

            <!-- Navigation dots -->
            <div class="slide-dots" id="slide-dots"></div>

            <!-- Loading overlay -->
            <div class="overlay" id="overlay">
                <div class="spinner"></div>
                <div class="overlay-text" id="overlay-text">Lade die neuesten Sport-Headlines...</div>
            </div>

            <!-- Error message -->
            <div class="error-message" id="error-message">
                Fehler beim Laden der Sportdaten.
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const BASE_URL = 'https://mattihas76.github.io/srf-sport-dashboard/';
        const PAUSE_DURATION = 5000;        // 5 seconds pause per slide
        const SCROLL_DURATION = 800;        // 0.8s transition between slides
        const UPDATE_INTERVAL = 60 * 60 * 1000; // Re-fetch every 60 minutes

        // --- State ---
        let slides = [];
        let currentSlide = 0;
        let slideTimer = null;
        let countdownTimer = null;
        let isPaused = false;

        // Category CSS class mapping
        const categoryClasses = {
            'Fussball': 'cat-fussball',
            'Eishockey': 'cat-eishockey',
            'Tennis': 'cat-tennis',
            'Mehr Sport': 'cat-mehr-sport',
        };

        const categoryColors = {
            'Fussball': '#22c55e',
            'Eishockey': '#3b82f6',
            'Tennis': '#f59e0b',
            'Mehr Sport': '#a855f7',
        };

        // --- Decode HTML entities ---
        function decodeHTML(text) {
            const el = document.createElement('textarea');
            el.innerHTML = text;
            return el.value;
        }

        // --- Fetch data ---
        async function fetchData() {
            const jsonUrl = BASE_URL + 'sport_data.json?t=' + new Date().getTime();
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error('sport_data.json not found');
            return await response.json();
        }

        // --- Build slides from data ---
        function buildSlides(data) {
            const allArticles = [];
            data.categories.forEach(cat => {
                cat.articles.forEach(article => {
                    allArticles.push({
                        category: cat.name,
                        emoji: cat.emoji,
                        cssClass: categoryClasses[cat.name] || 'cat-fussball',
                        color: categoryColors[cat.name] || '#3b82f6',
                        title: decodeHTML(article.title),
                        url: article.url,
                        image: article.image,
                    });
                });
            });
            return allArticles;
        }

        // --- Render slides into the ticker track ---
        function renderSlides() {
            const track = document.getElementById('ticker-track');
            const viewport = document.getElementById('ticker-viewport');
            track.innerHTML = '';

            slides.forEach((slide, i) => {
                const el = document.createElement('div');
                el.className = `slide ${slide.cssClass}`;
                el.style.width = viewport.offsetWidth + 'px';
                el.dataset.index = i;

                el.innerHTML = `
                    <div class="slide-image-wrapper">
                        <img class="slide-image" 
                             src="${slide.image}" 
                             alt="${slide.title.substring(0, 60)}"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%231e293b%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%2364748b%22 font-size=%2220%22>${slide.emoji}</text></svg>'">
                    </div>
                    <div class="slide-content">
                        <div class="slide-category">
                            <span>${slide.emoji}</span>
                            <span>${slide.category}</span>
                        </div>
                        <div class="slide-title">${slide.title}</div>
                    </div>
                `;

                track.appendChild(el);
            });

            // Build dots
            const dotsContainer = document.getElementById('slide-dots');
            dotsContainer.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.dataset.index = i;
                dotsContainer.appendChild(dot);
            });
        }

        // --- Go to a specific slide ---
        function goToSlide(index) {
            if (slides.length === 0) return;

            // Remove active from previous
            const prevSlide = document.querySelector('.slide.active');
            if (prevSlide) prevSlide.classList.remove('active');

            currentSlide = index % slides.length;
            const track = document.getElementById('ticker-track');
            const viewport = document.getElementById('ticker-viewport');
            const slideWidth = viewport.offsetWidth;

            // Move track
            track.style.transform = `translateX(-${currentSlide * slideWidth}px)`;

            // Activate current slide
            setTimeout(() => {
                const activeSlide = document.querySelectorAll('.slide')[currentSlide];
                if (activeSlide) activeSlide.classList.add('active');
            }, 100);

            // Update dots
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });

            // Update progress bar
            const progressBar = document.getElementById('progress-bar');
            const progress = ((currentSlide + 1) / slides.length) * 100;
            progressBar.style.width = progress + '%';

            // Start countdown
            startCountdown();
        }

        // --- Countdown timer for each slide ---
        function startCountdown() {
            clearInterval(countdownTimer);
            clearTimeout(slideTimer);

            const ring = document.getElementById('ring-progress');
            const circumference = 2 * Math.PI * 15.5; // r=15.5
            ring.style.strokeDasharray = circumference;

            let elapsed = 0;
            const step = 50; // update every 50ms

            countdownTimer = setInterval(() => {
                elapsed += step;
                const fraction = elapsed / PAUSE_DURATION;
                const offset = circumference * (1 - fraction);
                ring.style.strokeDashoffset = offset;

                if (elapsed >= PAUSE_DURATION) {
                    clearInterval(countdownTimer);
                    nextSlide();
                }
            }, step);
        }

        // --- Go to next slide ---
        function nextSlide() {
            goToSlide(currentSlide + 1);
        }

        // --- Stop ticker ---
        function stopTicker() {
            clearTimeout(slideTimer);
            clearInterval(countdownTimer);
        }

        // --- Initial load ---
        async function init() {
            try {
                const data = await fetchData();

                // Update badge
                document.getElementById('update-badge').textContent =
                    'Letztes Update: ' + data.lastUpdated;

                slides = buildSlides(data);

                if (slides.length === 0) {
                    throw new Error('No articles found');
                }

                renderSlides();

                // Hide overlay
                document.getElementById('overlay').classList.add('hidden');

                // Start ticker
                goToSlide(0);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('overlay').classList.add('hidden');
                document.getElementById('error-message').style.display = 'block';
            }
        }

        // --- Periodic update ---
        async function updateData() {
            stopTicker();

            // Show update overlay
            const overlay = document.getElementById('overlay');
            const overlayText = document.getElementById('overlay-text');
            overlayText.textContent = 'Bitte warten. Aktualisierung läuft...';
            overlay.classList.remove('hidden');

            try {
                const data = await fetchData();

                // Update badge
                document.getElementById('update-badge').textContent =
                    'Letztes Update: ' + data.lastUpdated;

                slides = buildSlides(data);
                renderSlides();

                // Short delay so user sees the message
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Hide overlay
                overlay.classList.add('hidden');

                // Restart from first slide
                goToSlide(0);

            } catch (error) {
                console.error('Update error:', error);
                overlayText.textContent = 'Aktualisierung fehlgeschlagen. Weiter mit bestehenden Daten...';
                await new Promise(resolve => setTimeout(resolve, 2000));
                overlay.classList.add('hidden');

                // Resume ticker with existing data
                if (slides.length > 0) {
                    goToSlide(currentSlide);
                }
            }
        }

        // --- Handle resize ---
        window.addEventListener('resize', () => {
            if (slides.length === 0) return;
            const viewport = document.getElementById('ticker-viewport');
            const slideWidth = viewport.offsetWidth;

            // Update all slide widths
            document.querySelectorAll('.slide').forEach(slide => {
                slide.style.width = slideWidth + 'px';
            });

            // Re-position
            const track = document.getElementById('ticker-track');
            track.style.transition = 'none';
            track.style.transform = `translateX(-${currentSlide * slideWidth}px)`;
            // Re-enable transition
            requestAnimationFrame(() => {
                track.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            });
        });

        // --- Start ---
        window.addEventListener('DOMContentLoaded', () => {
            init();
            // Schedule periodic updates
            setInterval(updateData, UPDATE_INTERVAL);
        });
    </script>
</body>
</html>
