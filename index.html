<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevent caching so Wix iframe always loads the latest version -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SRF Sport Dashboard</title>
    <meta name="description" content="Live Sport Dashboard mit den neuesten Headlines aus Fussball, Eishockey, Tennis und mehr Sport von SRF.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #e8f1fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f7ff;
            --glass-border: rgba(0,0,0,0.08);
            --accent-fussball: #16a34a;
            --accent-eishockey: #2563eb;
            --accent-tennis: #d97706;
            --accent-mehr: #9333ea;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-white: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            z-index: 0;
            animation: pulseGlow 10s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease-out;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #16a34a, #2563eb, #d97706, #9333ea);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .update-badge {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.35rem 1rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 1100px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2rem; }
        }

        /* Category Column */
        .category-column {
            animation: fadeInUp 0.6s ease-out both;
        }
        .category-column:nth-child(1) { animation-delay: 0.1s; }
        .category-column:nth-child(2) { animation-delay: 0.2s; }
        .category-column:nth-child(3) { animation-delay: 0.3s; }
        .category-column:nth-child(4) { animation-delay: 0.4s; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1rem;
            border-radius: 12px 12px 0 0;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .category-header .emoji {
            font-size: 1.4rem;
        }

        .cat-fussball .category-header { background: linear-gradient(135deg, rgba(22,163,74,0.15), rgba(22,163,74,0.05)); border-bottom: 2px solid var(--accent-fussball); color: var(--accent-fussball); }
        .cat-eishockey .category-header { background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(37,99,235,0.05)); border-bottom: 2px solid var(--accent-eishockey); color: var(--accent-eishockey); }
        .cat-tennis .category-header { background: linear-gradient(135deg, rgba(217,119,6,0.15), rgba(217,119,6,0.05)); border-bottom: 2px solid var(--accent-tennis); color: var(--accent-tennis); }
        .cat-mehr-sport .category-header { background: linear-gradient(135deg, rgba(147,51,234,0.15), rgba(147,51,234,0.05)); border-bottom: 2px solid var(--accent-mehr); color: var(--accent-mehr); }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Article Card */
        .article-card {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-top: none;
            padding: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }

        .article-card:last-child {
            border-radius: 0 0 12px 12px;
        }

        .article-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(0,0,0,0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .article-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .article-card:hover .article-image {
            transform: scale(1.05);
        }

        .article-image-wrapper {
            overflow: hidden;
            position: relative;
        }

        .article-body {
            padding: 0.85rem 1rem;
        }

        .article-title {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-white);
        }

        /* Loader */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-fussball);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            text-align: center;
            padding: 3rem;
            color: #f87171;
            font-weight: 600;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 2.5rem;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            opacity: 0.6;
        }

        /* Print */
        @media print {
            body { background: #fff; color: #000; }
            body::before { display: none; }
            .article-card { border: 1px solid #ccc; break-inside: avoid; }
            .article-title { color: #000; }
            .category-header { color: #000 !important; background: #f3f3f3 !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SRF Sport Dashboard</h1>
            <div class="update-badge" id="update-badge">Wird geladen...</div>
        </header>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <div>Lade die neuesten Sport-Headlines...</div>
        </div>

        <div class="error-message" id="error-message">
            Fehler beim Laden der Sportdaten. Bitte versuchen Sie es später erneut.
        </div>

        <div class="dashboard-grid" id="dashboard-grid" style="display: none;"></div>

        <footer>
            Datenquelle: srf.ch/sport &middot; Automatisch aktualisiert
        </footer>
    </div>

    <script>
        // --- Absolute base URL for GitHub Pages ---
        const BASE_URL = 'https://mattihas76.github.io/srf-sport-dashboard/';

        // --- Auto-reload every 60 minutes (works inside iframes) ---
        const RELOAD_INTERVAL_MS = 60 * 60 * 1000; // 60 minutes
        setInterval(() => {
            // Force a full reload bypassing cache
            window.location.replace(window.location.href.split('?')[0] + '?t=' + new Date().getTime());
        }, RELOAD_INTERVAL_MS);

        // Category CSS class mapping
        const categoryClasses = {
            'Fussball': 'cat-fussball',
            'Eishockey': 'cat-eishockey',
            'Tennis': 'cat-tennis',
            'Mehr Sport': 'cat-mehr-sport',
        };

        async function loadDashboard() {
            try {
                // Use absolute URL so it always works, even inside a Wix iframe
                const jsonUrl = BASE_URL + 'sport_data.json?t=' + new Date().getTime();
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error('sport_data.json not found');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-message').style.display = 'block';
            }
        }

        function decodeHTML(text) {
            const el = document.createElement('textarea');
            el.innerHTML = text;
            return el.value;
        }

        function renderDashboard(data) {
            document.getElementById('loader').style.display = 'none';
            const grid = document.getElementById('dashboard-grid');
            grid.style.display = 'grid';

            document.getElementById('update-badge').textContent = 
                'Letztes Update: ' + data.lastUpdated;

            data.categories.forEach(cat => {
                const cssClass = categoryClasses[cat.name] || 'cat-fussball';

                const col = document.createElement('div');
                col.className = `category-column ${cssClass}`;

                // Category header
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span class="emoji">${cat.emoji}</span> ${cat.name}`;
                col.appendChild(header);

                // Articles
                const list = document.createElement('div');
                list.className = 'articles-list';

                cat.articles.forEach((article, i) => {
                    const card = document.createElement('a');
                    card.className = 'article-card';
                    card.href = article.url;
                    card.target = '_blank';
                    card.rel = 'noopener';
                    card.style.animationDelay = `${0.1 + i * 0.1}s`;

                    let imageHTML = '';
                    if (article.image) {
                        imageHTML = `
                            <div class="article-image-wrapper">
                                <img class="article-image" 
                                     src="${article.image}" 
                                     alt="${decodeHTML(article.title).substring(0, 60)}"
                                     loading="lazy"
                                     onerror="this.parentElement.style.display='none'">
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        ${imageHTML}
                        <div class="article-body">
                            <div class="article-title">${decodeHTML(article.title)}</div>
                        </div>
                    `;

                    list.appendChild(card);
                });

                col.appendChild(list);
                grid.appendChild(col);
            });
        }

        // Load on page ready
        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
